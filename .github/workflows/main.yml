# This is a basic workflow to help you get started with Actions

name: slitaz-5.0
#on:
#  push:
#    branches: 
#      - main
#    schedule:
#      - cron: 0 20 1 * *
#    release:
#      types: [published]
on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - '*'
    release:
      types: [published]

jobs:

  build:

    name: 自动汉化并封装每周官方映像

    runs-on: ubuntu-20.04

    if: github.event.repository.owner.id == github.event.sender.id

    steps:

      - name: Checkout
        uses: actions/checkout@v2
#        with:
#          ref: main

      - name: Space cleanup
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi `docker images -q`
          sudo -E apt-get update
          sudo -E apt-get -y install zip unzip genisoimage p7zip-full p7zip-rar
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean

      - name: download iso and unzip iso
        run: |
          wget http://distro.ibiblio.org/slitaz/iso/rolling/slitaz-rolling-core64.iso
          mkdir iso-old
          7z x slitaz-rolling-core64.iso -y -r -o./iso-old
                    
      - name: docker build a new rootfs
        run: |
          docker build -t newrootfs -f ./dockerfile-rootfs .
          
      - name: copy rootfs.gz outside of docker
        run: |
          docker run --name myrootfs newrootfs
          docker cp myrootfs:/tmp/rootfs-new.gz ./iso/mkiso/rootfs.gz
          cd ./iso
          sh iso.sh

#      - name: Prepare artifact
#        run: |
#          mkdir -p ./artifact/package
#          cp -rf ./iso/slitaz-5.0.iso  ./artifact/package/

#      - name: Deliver package
#        uses: actions/upload-artifact@v2
#        with:
#          name: slitaz-5.0.iso
#          path: ./artifact/package/

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
      - name: Upload Release Asset
        id: upload-release-asset 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./iso/slitaz5.0-rolling-core64-cn.iso
          asset_name: slitaz5.0-rolling-core64-cn.iso
          asset_content_type: application/iso
